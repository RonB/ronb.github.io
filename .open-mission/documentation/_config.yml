gh_edit_repository: "__OPEN_MISSION_GITHUB_REPOSITORY_URL__"
gh_edit_branch: "__OPEN_MISSION_GITHUB_EDIT_BRANCH__"
gh_edit_source: ".open-mission/documentation"
gh_edit_view_mode: "tree"
mermaid:
  version: "10.7.0"