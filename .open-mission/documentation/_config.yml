title: Repository Documentation
description: Repository-owned Open Mission documentation.
remote_theme: just-the-docs/just-the-docs
plugins:
  - jekyll-remote-theme
search_enabled: true
search:
  heading_level: 2
  previews: 4
  preview_words_before: 6
  preview_words_after: 12
heading_anchors: true
aux_links_new_tab: true
gh_edit_link: __OPEN_MISSION_GITHUB_EDIT_LINK_ENABLED__
